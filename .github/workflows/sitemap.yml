name: Deploy Sitemap

on:
  push:
    branches:
      - main  # твоя основна гілка, якщо називається інакше — поміняй

jobs:
  deploy-sitemap:
    runs-on: ubuntu-latest
    steps:
      # 1. Беремо весь репозиторій
      - uses: actions/checkout@v3

      # 2. Копіюємо sitemap.xml в корінь (або в папку, яку GitHub Pages віддає)
      - name: Copy sitemap for Pages
        run: |
          cp sitemap.xml ./  

      # 3. Пушимо зміни назад (не обов'язково, якщо просто Pages від root)